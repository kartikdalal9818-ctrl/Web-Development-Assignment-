<!DOCTYPE html>
<html>
<head>
    <title>Smart Event Dashboard</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: white;
            padding: 20px;
            color: black; 
        }

        h1 {
            text-align: center;
            color: black;
            font-size: 32px;
        }

        .container {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            width: 50%;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }

        .card h2 {
            color: black;
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: 2px solid #cccccc;
            color: black;
        }

        button {
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 5px;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .add-btn {
            background: #00cc66;
            color: black;
        }

        .clear-btn {
            background: #cc0000;
            color: white;
        }

        .sample-btn {
            background: #ffcc00;
            color: black;
        }

        .event {
            background: #f5f5f5;
            padding: 12px;
            border-left: 6px solid black;
            margin-top: 10px;
            border-radius: 8px;
            position: relative;
            color: black;
        }

        .delete-btn {
            background: black;
            color: white;
            position: absolute;
            top: 8px;
            right: 8px;
        }

        .dom-box {
            margin-top: 30px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
            color: black;
        }
    </style>
</head>

<body>

<h1> Smart Event Dashboard</h1>

<div class="container">

    <div class="card">
        <h2>Add New Event</h2>

        <input type="text" id="title" placeholder="Event Title">
        <input type="date" id="date">

        <select id="category">
            <option>Conference</option>
            <option>Workshop</option>
            <option>Meeting</option>
            <option>Birthday</option>
        </select>

        <textarea id="description" placeholder="Description"></textarea>

        <button class="add-btn" onclick="addEvent()">Add Event</button>
    </div>

    <div class="card">
        <h2>My Events</h2>

        <button class="clear-btn" onclick="clearEvents()">Clear All</button>
        <button class="sample-btn" onclick="addSample()">Add Sample</button>

        <div id="eventList"></div>
    </div>

</div>

<div class="dom-box">
    <h2>DOM Manipulation Demo</h2>
    <p id="keyDisplay">Press any key...</p>
</div>

<script>
    function addEvent() {
        let title = document.getElementById("title").value;
        let date = document.getElementById("date").value;
        let category = document.getElementById("category").value;
        let description = document.getElementById("description").value;

        if (title === "" || date === "") {
            alert("Please enter title and date!");
            return;
        }

        let eventDiv = document.createElement("div");
        eventDiv.className = "event";

        eventDiv.innerHTML = `
            <strong>${title}</strong> (${category})<br>
            Date: ${date}<br>
            ${description}
            <button class="delete-btn" onclick="this.parentElement.remove()">X</button>
        `;

        document.getElementById("eventList").appendChild(eventDiv);

        document.getElementById("title").value = "";
        document.getElementById("date").value = "";
        document.getElementById("description").value = "";
    }

    function clearEvents() {
        document.getElementById("eventList").innerHTML = "";
    }

    function addSample() {
        document.getElementById("title").value = "Music Festival";
        document.getElementById("date").value = "2026-04-15";
        document.getElementById("category").value = "Conference";
        document.getElementById("description").value = "Live DJ and fun activities";
        addEvent();
    }

    document.addEventListener("keydown", function(event) {
        document.getElementById("keyDisplay").innerText =
            "You Pressed: " + event.key;
    });
</script>

</body>
</html>
